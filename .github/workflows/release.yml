name: Build and Publish Release

on:
  workflow_dispatch:
  push:
    branches:
      - feat/release-workflow
  release:
    types: [published]

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.2.2-devel-ubuntu22.04 
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Install System Dependencies & Deadsnakes
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y software-properties-common gdal-bin libgdal-dev cmake git build-essential patchelf
          
          add-apt-repository ppa:deadsnakes/ppa -y
          apt-get update
          
          apt-get install -y python${{ matrix.python-version }} python${{ matrix.python-version }}-dev python${{ matrix.python-version }}-venv

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fix Git Permissions for setuptools_scm
        run: git config --global --add safe.directory '*'

      - name: Create Virtual Environment and Install Build Deps
        run: |
          python${{ matrix.python-version }} -m venv /venv
          . /venv/bin/activate
          
          python -m pip install --upgrade pip
          python -m pip install build auditwheel pybind11 scikit-build-core

      - name: Build Python Wheel
        run: |
          . /venv/bin/activate
          python -m build --wheel

      - name: Bundle GDAL into the Wheel
        run: |
          . /venv/bin/activate
          auditwheel repair dist/*.whl --plat manylinux_2_35_x86_64 -w wheelhouse/

      - name: Smoke Test the Wheel
        run: |
          . /venv/bin/activate
          pip install wheelhouse/*.whl
          python -c "import curaster; print('Smoke test passed!')"

      - name: Upload Wheel as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: curaster-wheel-linux-${{ matrix.python-version }}
          path: wheelhouse/*.whl

  build-wheels-windows:
    name: Build Windows Wheels
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup MSVC Compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.17
        with:
          cuda: '12.4.1'

      - name: Setup Conda Environment (For GDAL)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: ${{ matrix.python-version }}
          activate-environment: curaster-build
          auto-activate-base: false

      - name: Install Build Dependencies and GDAL
        shell: pwsh
        run: |
          conda install -y -c conda-forge gdal delvewheel
          python -m pip install build pybind11 scikit-build-core setuptools_scm ninja

      - name: Build Python Wheel
        shell: pwsh
        run: python -m build --wheel

      - name: Bundle GDAL into the Wheel (Delvewheel)
        shell: pwsh
        run: |
          delvewheel repair dist/*.whl -w wheelhouse/ --add-path "$env:CONDA_PREFIX\Library\bin"

      - name: Smoke Test the Wheel
        shell: pwsh
        run: |
          pip install (Get-ChildItem wheelhouse\*.whl)[0].FullName
          python -c "import curaster; print('Windows smoke test passed!')"

      - name: Upload Wheel as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: curaster-wheel-windows-${{ matrix.python-version }}
          path: wheelhouse\*.whl

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-wheels-windows] 
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: curaster-wheel-*
          path: dist
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
